<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized service health dashboard mock</title>
  <desc id="desc">A mock Linux VPS dashboard with service status cards, scheduler status, and backup indicators.</desc>
  <rect width="1200" height="720" rx="28" fill="#09101d"/>
  <text x="64" y="76" fill="#f3f7ff" font-size="36" font-family="Inter,Segoe UI,Arial" font-weight="700">Self-hosted VPS operations dashboard</text>
  <text x="64" y="112" fill="#91a2bd" font-size="18" font-family="Inter,Segoe UI,Arial">Sanitized mock of service health, automation jobs, backup status, and operational guardrails.</text>
  <g font-family="Inter,Segoe UI,Arial">
    <rect x="70" y="150" width="1060" height="500" rx="22" fill="#0f1b2c" stroke="#2b3b56"/>
    <rect x="100" y="188" width="230" height="130" rx="18" fill="#142740" stroke="#39d98a"/>
    <text x="126" y="226" fill="#39d98a" font-size="18" font-weight="700">Gateway</text>
    <text x="126" y="260" fill="#d9e7f7" font-size="28" font-weight="700">Healthy</text>
    <text x="126" y="292" fill="#8ea0bd" font-size="14">Telegram delivery available</text>
    <rect x="360" y="188" width="230" height="130" rx="18" fill="#142740" stroke="#39d98a"/>
    <text x="386" y="226" fill="#39d98a" font-size="18" font-weight="700">Dashboard</text>
    <text x="386" y="260" fill="#d9e7f7" font-size="28" font-weight="700">Online</text>
    <text x="386" y="292" fill="#8ea0bd" font-size="14">Local admin overview</text>
    <rect x="620" y="188" width="230" height="130" rx="18" fill="#142740" stroke="#ffcf5a"/>
    <text x="646" y="226" fill="#ffcf5a" font-size="18" font-weight="700">Scheduled jobs</text>
    <text x="646" y="260" fill="#d9e7f7" font-size="28" font-weight="700">Active</text>
    <text x="646" y="292" fill="#8ea0bd" font-size="14">Next run queued</text>
    <rect x="880" y="188" width="220" height="130" rx="18" fill="#142740" stroke="#54c6ff"/>
    <text x="906" y="226" fill="#54c6ff" font-size="18" font-weight="700">Backups</text>
    <text x="906" y="260" fill="#d9e7f7" font-size="28" font-weight="700">Encrypted</text>
    <text x="906" y="292" fill="#8ea0bd" font-size="14">Remote DR storage</text>
    <rect x="100" y="365" width="470" height="220" rx="18" fill="#111f33" stroke="#2b3b56"/>
    <text x="130" y="408" fill="#ffffff" font-size="20" font-weight="700">Operational checks</text>
    <text x="130" y="450" fill="#9fb0cc" font-size="16">• disk and memory summary</text>
    <text x="130" y="482" fill="#9fb0cc" font-size="16">• service restart discipline</text>
    <text x="130" y="514" fill="#9fb0cc" font-size="16">• post-update verification guard</text>
    <text x="130" y="546" fill="#9fb0cc" font-size="16">• failure reports instead of silent drift</text>
    <rect x="630" y="365" width="470" height="220" rx="18" fill="#111f33" stroke="#2b3b56"/>
    <text x="660" y="408" fill="#ffffff" font-size="20" font-weight="700">Public-safe boundary</text>
    <text x="660" y="450" fill="#9fb0cc" font-size="16">• no production configuration</text>
    <text x="660" y="482" fill="#9fb0cc" font-size="16">• no secret values or raw logs</text>
    <text x="660" y="514" fill="#9fb0cc" font-size="16">• no browser profiles or cookies</text>
    <text x="660" y="546" fill="#9fb0cc" font-size="16">• architecture and workflow only</text>
  </g>
</svg>
