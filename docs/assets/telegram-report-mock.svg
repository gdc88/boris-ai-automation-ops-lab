<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized Telegram operations report mock</title>
  <desc id="desc">Portfolio-safe mock of an AI automation report delivered through Telegram, with private values replaced by placeholders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#16233b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="64" y="76" fill="#e6edf7" font-size="36" font-family="Inter,Segoe UI,Arial" font-weight="700">Telegram-first operations reporting</text>
  <text x="64" y="112" fill="#8ea0bd" font-size="18" font-family="Inter,Segoe UI,Arial">Mock data only — private chats, names, URLs, and IDs are intentionally replaced.</text>
  <rect x="86" y="150" width="430" height="520" rx="38" fill="#0c1628" stroke="#2b3a56" filter="url(#shadow)"/>
  <rect x="116" y="188" width="370" height="60" rx="20" fill="#17243a"/>
  <circle cx="148" cy="218" r="18" fill="#54c6ff"/>
  <text x="178" y="212" fill="#e6edf7" font-size="17" font-family="Inter,Segoe UI,Arial" font-weight="700">Hermes Ops</text>
  <text x="178" y="233" fill="#8ea0bd" font-size="13" font-family="Inter,Segoe UI,Arial">automated report · verified</text>
  <rect x="116" y="280" width="350" height="300" rx="20" fill="#1f8fdd"/>
  <text x="142" y="318" fill="#ffffff" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Daily automation summary</text>
  <text x="142" y="358" fill="#dff5ff" font-size="16" font-family="Inter,Segoe UI,Arial">Status: completed with visual QA</text>
  <text x="142" y="392" fill="#dff5ff" font-size="16" font-family="Inter,Segoe UI,Arial">Sources checked: 8</text>
  <text x="142" y="426" fill="#dff5ff" font-size="16" font-family="Inter,Segoe UI,Arial">Candidates: 12 reviewed / 4 flagged</text>
  <text x="142" y="460" fill="#dff5ff" font-size="16" font-family="Inter,Segoe UI,Arial">Tracker rows: updated after verification</text>
  <rect x="142" y="496" width="278" height="44" rx="12" fill="#ffffff" opacity="0.16"/>
  <text x="160" y="524" fill="#ffffff" font-size="15" font-family="Inter,Segoe UI,Arial">Open report / next actions</text>
  <g font-family="Inter,Segoe UI,Arial">
    <rect x="610" y="170" width="460" height="90" rx="20" fill="#101c31" stroke="#2b3a56"/>
    <text x="640" y="208" fill="#ffffff" font-size="20" font-weight="700">What this demonstrates</text>
    <text x="640" y="238" fill="#9eb1d1" font-size="16">Operational reporting, evidence-based status, and concise next actions.</text>
    <rect x="610" y="300" width="210" height="120" rx="18" fill="#112941" stroke="#1f8fdd"/>
    <text x="636" y="336" fill="#54c6ff" font-size="17" font-weight="700">Alerts</text>
    <text x="636" y="366" fill="#d7e5f5" font-size="15">Failure-only notifications</text>
    <text x="636" y="394" fill="#8ea0bd" font-size="14">Quiet on success</text>
    <rect x="860" y="300" width="210" height="120" rx="18" fill="#112941" stroke="#39d98a"/>
    <text x="886" y="336" fill="#39d98a" font-size="17" font-weight="700">Reports</text>
    <text x="886" y="366" fill="#d7e5f5" font-size="15">Clickable summaries</text>
    <text x="886" y="394" fill="#8ea0bd" font-size="14">Prepared for review</text>
    <rect x="610" y="456" width="460" height="130" rx="18" fill="#101c31" stroke="#2b3a56"/>
    <text x="640" y="496" fill="#ffffff" font-size="18" font-weight="700">Privacy boundary</text>
    <text x="640" y="528" fill="#9eb1d1" font-size="15">Real system uses authenticated services privately.</text>
    <text x="640" y="556" fill="#9eb1d1" font-size="15">Portfolio version shows structure and engineering approach only.</text>
  </g>
</svg>
