<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Visible browser QA contact sheet mock</title>
  <desc id="desc">A portfolio-safe contact sheet showing how visible browser workflows are verified with screenshots and status notes.</desc>
  <rect width="1200" height="720" rx="28" fill="#0b1020"/>
  <text x="64" y="76" fill="#f4f7fb" font-size="36" font-family="Inter,Segoe UI,Arial" font-weight="700">Visible-browser QA evidence</text>
  <text x="64" y="112" fill="#9aa8c7" font-size="18" font-family="Inter,Segoe UI,Arial">Contact-sheet style verification for UI-dependent workflows — sanitized placeholders only.</text>
  <g font-family="Inter,Segoe UI,Arial">
    <g transform="translate(70,155)">
      <rect width="310" height="210" rx="18" fill="#111b2e" stroke="#30415f"/>
      <rect x="20" y="24" width="270" height="126" rx="10" fill="#182842"/>
      <rect x="42" y="48" width="110" height="14" rx="7" fill="#54c6ff"/>
      <rect x="42" y="78" width="210" height="10" rx="5" fill="#667897"/>
      <rect x="42" y="102" width="170" height="10" rx="5" fill="#667897"/>
      <rect x="42" y="126" width="230" height="10" rx="5" fill="#667897"/>
      <text x="20" y="182" fill="#39d98a" font-size="16" font-weight="700">1. Login/session visible</text>
    </g>
    <g transform="translate(445,155)">
      <rect width="310" height="210" rx="18" fill="#111b2e" stroke="#30415f"/>
      <rect x="20" y="24" width="270" height="126" rx="10" fill="#182842"/>
      <circle cx="64" cy="86" r="28" fill="#54c6ff" opacity="0.75"/>
      <rect x="112" y="58" width="150" height="12" rx="6" fill="#d8e6ff"/>
      <rect x="112" y="84" width="120" height="10" rx="5" fill="#667897"/>
      <rect x="112" y="108" width="178" height="10" rx="5" fill="#667897"/>
      <text x="20" y="182" fill="#39d98a" font-size="16" font-weight="700">2. Source page inspected</text>
    </g>
    <g transform="translate(820,155)">
      <rect width="310" height="210" rx="18" fill="#111b2e" stroke="#30415f"/>
      <rect x="20" y="24" width="270" height="126" rx="10" fill="#182842"/>
      <rect x="42" y="48" width="226" height="22" rx="8" fill="#253956"/>
      <rect x="42" y="86" width="226" height="22" rx="8" fill="#253956"/>
      <rect x="42" y="124" width="150" height="22" rx="8" fill="#1f8fdd"/>
      <text x="20" y="182" fill="#ffcf5a" font-size="16" font-weight="700">3. Manual verify needed</text>
    </g>
    <g transform="translate(70,430)">
      <rect width="310" height="170" rx="18" fill="#111b2e" stroke="#30415f"/>
      <text x="24" y="44" fill="#ffffff" font-size="18" font-weight="700">Evidence captured</text>
      <text x="24" y="78" fill="#9aa8c7" font-size="15">Screenshot timestamps</text>
      <text x="24" y="108" fill="#9aa8c7" font-size="15">Visible state notes</text>
      <text x="24" y="138" fill="#9aa8c7" font-size="15">Pass / blocked / manual-review labels</text>
    </g>
    <g transform="translate(445,430)">
      <rect width="310" height="170" rx="18" fill="#111b2e" stroke="#30415f"/>
      <text x="24" y="44" fill="#ffffff" font-size="18" font-weight="700">Why it matters</text>
      <text x="24" y="78" fill="#9aa8c7" font-size="15">Many authenticated workflows fail silently</text>
      <text x="24" y="108" fill="#9aa8c7" font-size="15">UI evidence prevents false success claims</text>
      <text x="24" y="138" fill="#9aa8c7" font-size="15">Reports separate proven vs assumed</text>
    </g>
    <g transform="translate(820,430)">
      <rect width="310" height="170" rx="18" fill="#111b2e" stroke="#30415f"/>
      <text x="24" y="44" fill="#ffffff" font-size="18" font-weight="700">Portfolio boundary</text>
      <text x="24" y="78" fill="#9aa8c7" font-size="15">No real account names</text>
      <text x="24" y="108" fill="#9aa8c7" font-size="15">No cookies or browser profiles</text>
      <text x="24" y="138" fill="#9aa8c7" font-size="15">No private site content</text>
    </g>
  </g>
</svg>
