<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#020617"/><stop offset="1" stop-color="#111827"/></linearGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1e293b" stroke-width="0.6"/></pattern>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker>
  <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill:#e5e7eb; }
  .title{font-size:26px;font-weight:700}.subtitle{font-size:13px;fill:#94a3b8}.label{font-size:14px;font-weight:700}.small{font-size:10.5px;fill:#cbd5e1}.tiny{font-size:9px;fill:#94a3b8}.box{rx:12;stroke-width:1.6}.cyan{fill:rgba(8,51,68,.72);stroke:#22d3ee}.green{fill:rgba(6,78,59,.72);stroke:#34d399}.violet{fill:rgba(76,29,149,.62);stroke:#a78bfa}.amber{fill:rgba(120,53,15,.58);stroke:#fbbf24}.rose{fill:rgba(136,19,55,.58);stroke:#fb7185}.slate{fill:rgba(30,41,59,.72);stroke:#94a3b8}.orange{fill:rgba(124,45,18,.60);stroke:#fb923c}.line{stroke:#67e8f9;stroke-width:2;fill:none;marker-end:url(#arrow);opacity:.9}.dash{stroke-dasharray:6 5}.muted{stroke:#64748b;marker-end:url(#arrow);opacity:.7}
</style>
<title id="title">Professional Workflow Evidence</title><desc id="desc">Portfolio-safe visual showing the operational dashboard/reporting style without exposing private data.</desc>
<rect width="100%" height="100%" fill="url(#bg)"/><rect width="100%" height="100%" fill="url(#grid)" opacity=".75"/>
<text x="40" y="48" class="title">Professional Workflow Evidence</text><text x="40" y="72" class="subtitle">Portfolio-safe visual showing the operational dashboard/reporting style without exposing private data.</text>

<rect x="52" y="112" width="856" height="298" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
<rect x="52" y="112" width="856" height="42" rx="16" fill="#111827" stroke="#334155"/><circle cx="78" cy="133" r="6" fill="#22c55e"/><circle cx="98" cy="133" r="6" fill="#f59e0b"/><circle cx="118" cy="133" r="6" fill="#ef4444"/><text x="145" y="138" class="small">Hermes Operations Dashboard — sanitized portfolio mock</text>
<rect x="82" y="180" width="180" height="82" class="box green"/><text x="104" y="210" class="label">Services</text><text x="104" y="234" class="small">Gateway: healthy</text><text x="104" y="250" class="tiny">Dashboard · Bot API · timers</text>
<rect x="290" y="180" width="180" height="82" class="box cyan"/><text x="312" y="210" class="label">Agent Jobs</text><text x="312" y="234" class="small">Scheduled scans</text><text x="312" y="250" class="tiny">quiet success · alert failure</text>
<rect x="498" y="180" width="180" height="82" class="box violet"/><text x="520" y="210" class="label">Knowledge</text><text x="520" y="234" class="small">Skills + memory</text><text x="520" y="250" class="tiny">reusable workflows</text>
<rect x="706" y="180" width="172" height="82" class="box amber"/><text x="728" y="210" class="label">Reports</text><text x="728" y="234" class="small">Telegram delivery</text><text x="728" y="250" class="tiny">actionable summaries</text>
<rect x="82" y="298" width="376" height="76" class="box slate"/><text x="106" y="326" class="label">Example output</text><text x="106" y="350" class="small">Candidate roles: URL · reason · tracker status · next action</text>
<rect x="502" y="298" width="376" height="76" class="box rose"/><text x="526" y="326" class="label">Public-safe boundary</text><text x="526" y="350" class="small">Screenshots mocked/sanitized; no private credentials or personal records</text>

</svg>