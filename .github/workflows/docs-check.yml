name: docs-check
on:
  push:
  pull_request:

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          test -f README.md
          test -f docs/architecture.md
          test -f docs/case-studies.md
          test -f docs/screenshots.md
          test -f docs/public-positioning.md
          test -f SECURITY.md
      - name: Basic secret pattern guard
        run: |
          ! grep -RInE '(api[_-]?key|token|password|secret)\s*[:=]\s*[^\[]' . --exclude-dir=.git || (echo 'Potential secret-like assignment found' && exit 1)
